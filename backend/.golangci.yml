run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    check-shadowing: true
  gofmt:
    simplify: true
  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude generated files
    - path: internal/repositories/sqlcdb/
      linters:
        - all
    # Allow unused parameters in tests
    - path: _test\.go
      linters:
        - unparam
  max-same-issues: 0
  new: false
